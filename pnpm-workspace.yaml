packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  # @sentry/cli's binary is only needed to UPLOAD source maps at build time (a cutover
  # step). We don't run it here, so its build script stays off — reporting itself works
  # without it. Flip to true when wiring source-map upload with SENTRY_AUTH_TOKEN.
  '@sentry/cli': false
  # esbuild native binary — used by vite, vitest, and tsx.
  esbuild: true
  # Native resolver used by eslint-plugin-import-x (via eslint-config-expo).
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@typescript-eslint/eslint-plugin@8.64.0'
  - '@typescript-eslint/parser@8.64.0'
  - '@typescript-eslint/project-service@8.64.0'
  - '@typescript-eslint/scope-manager@8.64.0'
  - '@typescript-eslint/tsconfig-utils@8.64.0'
  - '@typescript-eslint/type-utils@8.64.0'
  - '@typescript-eslint/types@8.64.0'
  - '@typescript-eslint/typescript-estree@8.64.0'
  - '@typescript-eslint/utils@8.64.0'
  - '@typescript-eslint/visitor-keys@8.64.0'
  - typescript-eslint@8.64.0
  - '@expo/cli@56.1.20'
  - '@expo/config-plugins@56.0.13'
  - '@expo/config@56.0.12'
  - '@expo/fingerprint@0.19.8'
  - '@expo/image-utils@0.10.3'
  - '@expo/inline-modules@0.0.14'
  - '@expo/local-build-cache-provider@56.0.10'
  - '@expo/metro-config@56.0.17'
  - '@expo/prebuild-config@56.0.20'
  - '@expo/require-utils@56.1.5'
  - expo-asset@56.0.20
  - expo-constants@56.0.21
  - expo-modules-autolinking@56.0.20
  - expo-modules-core@56.0.21
  - expo@56.0.16
  - '@expo/metro-runtime@56.0.17'
  - '@expo/ui@56.0.22'
  - expo-router@56.2.15
  - expo-splash-screen@56.0.13

# React Native / Metro do not play well with pnpm's isolated (symlinked) node_modules.
# Expo's monorepo guide recommends a hoisted node-linker.
nodeLinker: hoisted
